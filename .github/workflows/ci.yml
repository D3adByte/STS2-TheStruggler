name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate mod manifest
        run: |
          jq empty Struggler.json
          test "$(jq -r '.id' Struggler.json)" = "Struggler"
          test "$(jq -r '.has_dll' Struggler.json)" = "true"

      - name: Validate localization JSON
        run: |
          shopt -s nullglob
          files=(Struggler/localization/**/*.json)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No localization files found"
            exit 1
          fi
          for f in "${files[@]}"; do
            echo "Checking $f"
            jq empty "$f"
          done

      - name: Check required project files
        run: |
          for f in Struggler.csproj Struggler.json project.godot Sts2PathDiscovery.props Directory.Build.props.example; do
            test -f "$f" || { echo "Missing $f"; exit 1; }
          done
          test -d StrugglerCode
          test -f StrugglerCode/MainFile.cs

      - name: Block committed game binaries
        run: |
          if git ls-files | grep -Ei '(sts2\.dll|0Harmony\.dll|\.pck$)'; then
            echo "::error::Game binaries or built .pck must not be committed"
            exit 1
          fi
          echo "No forbidden binaries in git index"

      - name: Block local path overrides in tracked files
        run: |
          if git grep -n 'Program Files (x86)/Steam' -- ':!Directory.Build.props.example' ':!README.md' ':!CONTRIBUTING.md' ':!Sts2PathDiscovery.props' ':!.github/**'; then
            echo "::error::Hard-coded local Steam paths found in tracked source"
            exit 1
          fi

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build mod
    runs-on: ubuntu-latest
    needs: [validate]
    if: vars.ENABLE_STS2_CI_BUILD == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Verify CI game deps
        run: |
          mkdir -p ci/game-deps
          if [ ! -f ci/game-deps/sts2.dll ] || [ ! -f ci/game-deps/0Harmony.dll ]; then
            echo "::error::ENABLE_STS2_CI_BUILD is true but ci/game-deps/ is missing sts2.dll or 0Harmony.dll"
            echo "Add them via a private fork workflow or self-hosted runner — never commit to public main."
            exit 1
          fi

      - name: Build
        run: |
          dotnet build Struggler.csproj -c Release \
            -p:Sts2DataDir="${{ github.workspace }}/ci/game-deps" \
            -p:ModsPath="${{ github.workspace }}/ci/out/mods/" \
            -p:SkipSts2DependencyCheck=false

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: struggler-build
          path: |
            ci/out/mods/Struggler/
          if-no-files-found: error

  build-skipped:
    name: Build (skipped — no game DLLs on runner)
    runs-on: ubuntu-latest
    needs: [validate]
    if: vars.ENABLE_STS2_CI_BUILD != 'true'
    steps:
      - name: Note
        run: |
          echo "Compile check skipped — GitHub runners do not include STS2."
          echo "Validation and security jobs still protect the repo."
          echo "To enable compile CI, set repository variable ENABLE_STS2_CI_BUILD=true"
          echo "and provide game DLLs on a self-hosted runner or private workflow."
          dotnet --version || true
