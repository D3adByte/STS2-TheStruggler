name: Sign release

# Builds Struggler.dll and submits it to SignPath for Authenticode signing.
# Requires SIGNPATH_API_TOKEN + SIGNPATH_ORG_ID secrets (after SignPath Foundation approval).
# See SIGNPATH.md for setup.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    name: Build unsigned mod
    runs-on: ubuntu-latest
    outputs:
      artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Verify CI game deps
        run: |
          mkdir -p ci/game-deps ci/out/mods/Struggler
          if [ ! -f ci/game-deps/sts2.dll ] || [ ! -f ci/game-deps/0Harmony.dll ]; then
            echo "::error::Missing ci/game-deps/sts2.dll or 0Harmony.dll"
            echo "Use a self-hosted runner with game DLLs, or a private workflow that injects them."
            echo "See SIGNPATH.md — public GitHub runners cannot include STS2 binaries."
            exit 1
          fi

      - name: Build Struggler.dll
        run: |
          dotnet build Struggler.csproj -c Release \
            -p:Sts2DataDir="${{ github.workspace }}/ci/game-deps" \
            -p:ModsPath="${{ github.workspace }}/ci/out/mods/" \
            -p:SkipSts2DependencyCheck=false

      - name: Package unsigned artifact
        run: |
          mkdir -p dist
          cp ci/out/mods/Struggler/Struggler.dll dist/
          cp Struggler.json dist/
          sha256sum dist/Struggler.dll | tee dist/SHA256SUMS

      - name: Upload unsigned artifact
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: struggler-unsigned
          path: dist/
          if-no-files-found: error

  sign:
    name: Sign via SignPath
    runs-on: ubuntu-latest
    needs: build
    if: ${{ secrets.SIGNPATH_API_TOKEN != '' && secrets.SIGNPATH_ORG_ID != '' }}
    steps:
      - name: Submit signing request
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
          project-slug: sts2-the-struggler
          signing-policy-slug: release-signing
          artifact-configuration-slug: struggler-mod-dll
          github-artifact-id: ${{ needs.build.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed

      - name: Verify signature present
        run: |
          test -f signed/Struggler.dll
          ls -la signed/

      - name: Package signed release zip
        run: |
          mkdir -p release
          cp signed/Struggler.dll release/
          cp signed/Struggler.json release/ 2>/dev/null || cp Struggler.json release/
          (cd release && sha256sum Struggler.dll > SHA256SUMS)
          zip -j struggler-signed.zip release/*

      - name: Upload signed workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: struggler-signed
          path: struggler-signed.zip
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: struggler-signed.zip
          fail_on_unmatched_files: true

  sign-skipped:
    name: Sign (skipped — no SignPath secrets)
    runs-on: ubuntu-latest
    needs: build
    if: ${{ secrets.SIGNPATH_API_TOKEN == '' || secrets.SIGNPATH_ORG_ID == '' }}
    steps:
      - run: |
          echo "::warning::SIGNPATH_API_TOKEN or SIGNPATH_ORG_ID not set."
          echo "Apply at https://signpath.org/ then add secrets. See SIGNPATH.md"
