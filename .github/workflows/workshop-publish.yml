name: Workshop publish

# Build + upload Struggler to Steam Workshop (SAC-safe distribution).
# See WORKSHOP.md for setup.

on:
  workflow_dispatch:
    inputs:
      change_note:
        description: Workshop change note
        required: false
        default: Dev build from GitHub Actions

permissions:
  contents: read

env:
  STS2_APP_ID: "2868840"
  BASELIB_WORKSHOP_ID: "3737335127"

jobs:
  build:
    name: Build mod package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install MegaDot
        run: |
          curl -L -o megadot.zip "https://megadot.megacrit.com/4.5.1-m.11/megadot-4.5.1-m.11-linux-x86_64-editor-csharp.zip"
          unzip -q megadot.zip -d megadot
          chmod +x megadot/MegaDot_v4.5.1-stable_mono_linux.x86_64
          echo "GODOT_PATH=$(pwd)/megadot/MegaDot_v4.5.1-stable_mono_linux.x86_64" >> "$GITHUB_ENV"

      - name: Verify CI game deps
        run: |
          if [ ! -f ci/game-deps/sts2.dll ] || [ ! -f ci/game-deps/0Harmony.dll ]; then
            echo "::error::Add sts2.dll + 0Harmony.dll to ci/game-deps/ on a self-hosted runner,"
            echo "or run ./scripts/prepare-workshop.sh locally and ./scripts/publish-workshop.sh --windows"
            exit 1
          fi

      - name: Publish mod
        run: |
          mkdir -p output/mods workshop/content
          dotnet publish Struggler.csproj -c Release \
            -p:GodotPath="$GODOT_PATH" \
            -p:Sts2DataDir="${{ github.workspace }}/ci/game-deps" \
            -p:ModsPath="${{ github.workspace }}/output/mods/" \
            -p:SkipSts2DependencyCheck=false
          cp output/mods/Struggler/Struggler.{dll,json,pck} workshop/content/
          cp Struggler/mod_image.png workshop/image.png
          python3 - <<'PY'
          import json
          from pathlib import Path
          p = Path("workshop/workshop.json")
          d = json.loads(p.read_text())
          d["changeNote"] = """${{ inputs.change_note }}"""
          p.write_text(json.dumps(d, indent=2) + "\n")
          PY

      - name: Upload workshop artifact
        uses: actions/upload-artifact@v4
        with:
          name: struggler-workshop
          path: workshop/
          if-no-files-found: error

  upload:
    name: Upload to Steam Workshop
    runs-on: ubuntu-latest
    needs: build
    if: ${{ secrets.STEAM_USERNAME != '' && secrets.STEAM_CONFIG_VDF != '' }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: struggler-workshop
          path: workshop

      - name: Install STS2 ModUploader
        run: |
          curl -fsSL -o uploader.zip \
            "https://github.com/Miooowo/sts2-mod-uploader/releases/download/v0.0.5-fix/ModUploader-linux-x64.zip"
          unzip -q uploader.zip -d uploader

      - name: Restore Steam session
        env:
          STEAM_CONFIG_VDF: ${{ secrets.STEAM_CONFIG_VDF }}
        run: |
          mkdir -p ~/.steam
          printf '%s' "$STEAM_CONFIG_VDF" > ~/.steam/config.vdf

      - name: Upload workshop item
        env:
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
        run: |
          ID_ARG=""
          if [ -n "${{ vars.WORKSHOP_PUBLISHED_FILE_ID }}" ]; then
            echo "${{ vars.WORKSHOP_PUBLISHED_FILE_ID }}" > workshop/mod_id.txt
          fi
          ./uploader/ModUploader upload -w workshop ${ID_ARG}

      - name: Print workshop item id
        if: hashFiles('workshop/mod_id.txt') != ''
        run: |
          echo "Workshop item ID: $(cat workshop/mod_id.txt)"
          echo "Set repo variable WORKSHOP_PUBLISHED_FILE_ID to this value."

  upload-skipped:
    name: Upload (skipped — no Steam secrets)
    runs-on: ubuntu-latest
    needs: build
    if: ${{ secrets.STEAM_USERNAME == '' || secrets.STEAM_CONFIG_VDF == '' }}
    steps:
      - run: |
          echo "::warning::Set STEAM_USERNAME and STEAM_CONFIG_VDF secrets for automated Workshop upload."
          echo "See WORKSHOP.md — or upload locally with ./scripts/publish-workshop.sh --windows"
